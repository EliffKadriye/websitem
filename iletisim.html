    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">Öğrenci Paneli</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Hakkında</a></li>
                    <li class="nav-item"><a class="nav-link" href="cv.html">Özgeçmiş</a></li>

                    <li class="nav-item"><a class="nav-link active" href="iletisim.html">İletişim</a></li>

    <div class="container my-5" id="app">
        <div class="card shadow p-4">
            <h2 class="mb-4 text-center">İletişim Formu</h2>
            <form id="contactForm" action="gonder.php" method="POST" enctype="multipart/form-data">
                
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Ad Soyad:</label>
                        <input type="text" name="ad" class="form-control" v-model="formData.ad">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Parola:</label>
                        <input type="password" name="parola" class="form-control" v-model="formData.parola">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">E-Posta:</label>
                        <input type="email" name="email" class="form-control" v-model="formData.email">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Telefon:</label>
                        <input type="tel" name="telefon" class="form-control" v-model="formData.telefon">
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">Yaş:</label>
                        <input type="number" name="yas" class="form-control">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Web Sitesi:</label>
                        <input type="url" name="website" class="form-control">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Doğum Tarihi:</label>
                        <input type="date" name="dogumtarihi" class="form-control">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Saat:</label>
                        <input type="time" name="saat" class="form-control">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label d-block">Cinsiyet:</label>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="cinsiyet" value="Erkek"> Erkek
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="cinsiyet" value="Kadın"> Kadın
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label d-block">Hobiler:</label>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="checkbox" name="hobiler[]" value="Spor"> Spor
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="checkbox" name="hobiler[]" value="Müzik"> Müzik
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Şehir:</label>
                        <select name="sehir" class="form-select">
                            <option value="">Seçiniz</option>
                            <option value="Sakarya">Sakarya</option>
                            <option value="İstanbul">İstanbul</option>
                        </select>
                    </div>

                    <div class="col-12">
                        <label class="form-label">Mesajınız:</label>
                        <textarea name="mesaj" class="form-control" rows="3"></textarea>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Dosya Yükle:</label>
                        <input type="file" name="dosya" class="form-control">
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">Memnuniyet:</label>
                        <input type="range" name="memnuniyet" class="form-range">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Renk:</label>
                        <input type="color" name="renk" class="form-control form-control-color w-100">
                    </div>

                    <input type="hidden" name="gizli_form_ogesi" value="proje-odevi-2026">
                    <input type="hidden" name="form_tipi" value="iletisim-formu">

                    <div class="col-12 mt-4 text-center">
                        <button type="button" class="btn btn-warning me-2" onclick="validateNativeJS()">Native JS ile Gönder</button>
                        <button type="button" class="btn btn-info" @click="validateVueJS">Vue.js ile Gönder</button>
                        <button type="reset" class="btn btn-secondary ms-2">Sıfırla</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script>
        // 1. NATIVE JAVASCRIPT DENETİMİ
        function validateNativeJS() {
            const form = document.getElementById('contactForm');
            const ad = form.ad.value;
            const email = form.email.value;
            const telefon = form.telefon.value;
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (ad === "" || email === "") {
                alert("Native JS: Ad ve Email boş bırakılamaz!");
            } else if (!emailRegex.test(email)) {
                alert("Native JS: Geçersiz email formatı!");
            } else if (isNaN(telefon) || telefon === "") {
                alert("Native JS: Telefon sadece rakam olmalıdır!");
            } else {
                alert("Native JS: Kontrol başarılı! Form gönderiliyor...");
                form.submit();
            }
        }

        // 2. VUE.JS DENETİMİ
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    formData: { ad: '', email: '', telefon: '', parola: '' }
                }
            },
            methods: {
                validateVueJS() {
                    if (!this.formData.ad || !this.formData.email) {
                        alert("Vue.js: Ad ve Email zorunludur!");
                    } else if (!this.formData.email.includes('@')) {
                        alert("Vue.js: Geçerli bir mail giriniz!");
                    } else {
                        alert("Vue.js: Kontrol başarılı! Form gönderiliyor...");
                        document.getElementById('contactForm').submit();
                    }
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
